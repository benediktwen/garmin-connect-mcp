services:
  - type: web
    name: garmin-health-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GARMINTOKENS_BASE64
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_ALLOWED_USER
        value: benediktwen
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: TOKEN_STORE_KEY
        value: mcp:garmin:token_store
