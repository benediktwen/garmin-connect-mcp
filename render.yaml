services:
  - type: web
    name: garmin-health-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GARMINTOKENS_BASE64
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_ALLOWED_USER
        value: benediktwen
